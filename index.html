<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <title>Student Registration System</title>
  </head>
  <body>
    <div class="container">
      <div class="tabs">
        <button onclick="showForm('register')">Register</button>
        <button class="active" onclick="showForm('login')">Login</button>
      </div>

      <!-- LOGIN PAGE -->
      <div id="login" class="form-section active">
        <h2>Sign In</h2>

        <form id="loginForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required />
            <div class="error" id="passwordError"></div>
          </div>

          <button type="submit" class="submit-btn">Login</button>
        </form>
      </div>

      <!-- REGISTRATION PAGE -->
      <div id="register" class="form-section">
        <h2>Registration Page</h2>

        <form id="registerForm">
          <div class="form-group">
            <label>Surname</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Reg Number</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Other Name</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" required />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" required />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" required />
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select required>
              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
          <div class="form-group">
            <label for="state">State of Origin</label>
            <select id="state" required>
              <option value="">Select State</option>
            </select>
          </div>

          <div class="form-group">
            <label for="lga">Local Government Area (LGA)</label>
            <select id="lga" required>
              <option value="">Select LGA</option>
            </select>
          </div>

            <label>Nationality</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Passport Photograph (Max 500KB)</label>
            <input type="file" id="passport" accept="image/*" required />

            <div class="error" id="fileError"></div>

            <img id="previewImage" class="preview" alt="Passport Preview" />
